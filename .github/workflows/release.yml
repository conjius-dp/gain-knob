name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  check-changes:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      plugin_changed: ${{ steps.filter.outputs.plugin_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for plugin code changes since last release
        id: filter
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous release tag found, proceeding with release"
            echo "plugin_changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD -- Source/ Tests/ Assets/ CMakeLists.txt .github/workflows/ ':(exclude)Assets/badges/*')
            if [ -n "$CHANGED" ]; then
              echo "plugin_changed=true" >> "$GITHUB_OUTPUT"
              echo "Plugin files changed since $LAST_TAG:"
              echo "$CHANGED"
            else
              echo "plugin_changed=false" >> "$GITHUB_OUTPUT"
              echo "No plugin files changed since $LAST_TAG, skipping release"
            fi
          fi

  build-macos:
    needs: check-changes
    if: needs.check-changes.outputs.plugin_changed == 'true'
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ccache
        run: brew install ccache

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.12

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-release-${{ hashFiles('Source/**', 'CMakeLists.txt') }}
          restore-keys: ccache-release-

      - name: Configure (Release)
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build Standalone
        run: cmake --build build --target Boostor_Standalone

      - name: Build VST3
        run: cmake --build build --target Boostor_VST3

      - name: Build AU
        run: cmake --build build --target Boostor_AU

      - name: Zip Standalone
        run: |
          cd build/Boostor_artefacts/Release/Standalone
          zip -r "$GITHUB_WORKSPACE/Boostor-macOS-Standalone.zip" boostor.app

      - name: Zip VST3
        run: |
          cd build/Boostor_artefacts/Release/VST3
          zip -r "$GITHUB_WORKSPACE/Boostor-macOS-VST3.zip" boostor.vst3

      - name: Zip AU
        run: |
          cd build/Boostor_artefacts/Release/AU
          zip -r "$GITHUB_WORKSPACE/boostor-macOS-AU.zip" boostor.component

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            Boostor-macOS-Standalone.zip
            Boostor-macOS-VST3.zip
            boostor-macOS-AU.zip

  build-windows:
    needs: check-changes
    if: needs.check-changes.outputs.plugin_changed == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.12

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

      - name: Configure (Release)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --config Release --target Boostor_VST3

      - name: Zip VST3
        shell: pwsh
        run: |
          Compress-Archive -Path build\Boostor_artefacts\Release\VST3\boostor.vst3 -DestinationPath Boostor-Windows-VST3.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: Boostor-Windows-VST3.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts

      - name: Read version and bump patch
        id: version
        run: |
          CURRENT=$(sed -n 's/.*project(Boostor VERSION \([0-9]*\.[0-9]*\.[0-9]*\)).*/\1/p' CMakeLists.txt)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          sed -i "s/project(Boostor VERSION ${CURRENT})/project(Boostor VERSION ${NEW_VERSION})/" CMakeLists.txt

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CMakeLists.txt
          git commit -m "Bump version to ${{ steps.version.outputs.tag }}"
          git push

      - name: Tag release
        run: |
          git tag -a ${{ steps.version.outputs.tag }} -m "Release ${{ steps.version.outputs.tag }}"
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: boostor ${{ steps.version.outputs.tag }}
          body: |
            **Artifacts:**
            - `Boostor-macOS-Standalone.zip` - macOS standalone app
            - `Boostor-macOS-VST3.zip` - macOS VST3 plugin
            - `boostor-macOS-AU.zip` - macOS AU plugin
            - `Boostor-Windows-VST3.zip` - Windows VST3 plugin
          files: |
            Boostor-macOS-Standalone.zip
            Boostor-macOS-VST3.zip
            boostor-macOS-AU.zip
            Boostor-Windows-VST3.zip
